<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pixel Wigglegram Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.3.2/gifshot.min.js"></script>
<style>
  body {
    background-color: #0f1115;
    color: white;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overscroll-behavior-y: contain;
  }
  
  .view-container {
    display: none;
    flex-direction: column;
    height: 100dvh;
    width: 100%;
  }
  
  .view-container.active {
    display: flex;
  }

  .controls-bar {
    padding: 20px;
    padding-bottom: env(safe-area-inset-bottom, 20px);
    background: rgba(15, 17, 21, 0.95);
    backdrop-filter: blur(10px);
    z-index: 20;
  }

  .shutter-btn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: white;
    border: 4px solid #cbd5e1;
    outline: 4px solid white;
    outline-offset: -8px;
    transition: transform 0.1s;
  }
  
  .shutter-btn:active {
    transform: scale(0.95);
  }
</style>
</head>
<body>

  <!-- VIEW 1: CAMERA -->
  <div id="camera-view" class="view-container active">
    
    <!-- Top Bar: Now using a strict 3-column grid for perfect centering -->
    <div class="absolute top-0 left-0 w-full p-4 z-20 grid grid-cols-3 items-center bg-gradient-to-b from-black/60 to-transparent">
      
      <div class="justify-self-start">
        <button id="btn-switch-camera" aria-label="Switch Camera" class="bg-black/40 hover:bg-black/60 p-2 rounded-full backdrop-blur transition-transform active:scale-95 text-white shadow-lg">
          <i data-lucide="switch-camera" class="w-6 h-6"></i>
        </button>
      </div>
      
      <div class="justify-self-center">
        <button id="btn-aspect" class="bg-black/40 hover:bg-black/60 px-4 py-2 rounded-full backdrop-blur text-sm font-bold text-white shadow-lg transition-transform active:scale-95 tracking-widest">
          3:4
        </button>
      </div>

      <div class="justify-self-end">
        <div id="photo-counter" class="bg-blue-600 px-3 py-1.5 rounded-full text-sm font-bold shadow-lg">0 / 15</div>
      </div>

    </div>

    <!-- Viewfinder Area -->
    <div id="viewfinder-container" class="flex-grow flex items-center justify-center bg-black overflow-hidden relative">
      <div id="viewfinder" class="relative transition-all duration-300">
        <video id="video-stream" autoplay playsinline class="absolute top-0 left-0 w-full h-full object-cover"></video>
        <img id="ghost-overlay" class="absolute top-0 left-0 w-full h-full object-cover opacity-45 pointer-events-none z-10 hidden" style="filter: contrast(1.2) grayscale(0.2);" alt="Ghost overlay for alignment">
        
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-10 opacity-30">
          <i data-lucide="crosshair" class="w-12 h-12 text-white"></i>
        </div>
      </div>
    </div>

    <!-- Bottom Controls: Also updated to strict 3-column grid -->
    <div class="controls-bar grid grid-cols-3 items-center">
      
      <div class="justify-self-start">
        <button id="btn-reset" class="p-3 text-red-400 disabled:opacity-30 disabled:text-gray-500 transition-opacity" disabled>
          <i data-lucide="trash-2" class="w-6 h-6"></i>
        </button>
      </div>

      <div class="justify-self-center">
        <button id="btn-capture" class="shutter-btn shadow-lg" aria-label="Take Photo"></button>
      </div>

      <div class="justify-self-end">
        <button id="btn-generate" class="p-3 text-blue-400 disabled:opacity-30 disabled:text-gray-500 transition-colors" disabled>
          <i data-lucide="check-circle-2" class="w-8 h-8"></i>
        </button>
      </div>

    </div>
  </div>

  <!-- VIEW 2: PREVIEW -->
  <div id="preview-view" class="view-container">
    <div class="absolute top-0 left-0 w-full p-4 z-20 grid grid-cols-3 items-center bg-gradient-to-b from-black/60 to-transparent">
      
      <div class="justify-self-start">
        <button id="btn-back" class="bg-black/50 p-2 rounded-full backdrop-blur text-white">
          <i data-lucide="arrow-left" class="w-6 h-6"></i>
        </button>
      </div>
      
      <div class="justify-self-center font-semibold drop-shadow-md whitespace-nowrap">
        Your Wigglegram
      </div>
      
      <div class="justify-self-end"></div>

    </div>

    <div class="flex-grow flex items-center justify-center bg-black p-4">
      <img id="wiggle-result" src="" alt="Animated Wigglegram" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl">
    </div>

    <div class="controls-bar">
      <label class="block text-sm font-medium text-gray-300 mb-2 flex justify-between">
        <span>Animation Speed</span>
        <span><span id="speed-display">120</span>ms</span>
      </label>
      <input type="range" id="speed-slider" min="40" max="300" value="120" dir="rtl" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
      
      <button id="btn-save-gif" class="mt-6 w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-colors">
        <i data-lucide="download" class="w-5 h-5"></i>
        <span>Save as High-Res GIF</span>
      </button>
      <p id="gif-loading" class="text-sm text-center text-blue-400 mt-2 hidden animate-pulse">Processing high-quality GIF... please wait.</p>
    </div>
  </div>

  <!-- Hidden Canvas for Image Processing -->
  <canvas id="capture-canvas" class="hidden"></canvas>

  <script>
    lucide.createIcons();

    // Elements
    const cameraView = document.getElementById('camera-view');
    const previewView = document.getElementById('preview-view');
    const viewfinderContainer = document.getElementById('viewfinder-container');
    const viewfinder = document.getElementById('viewfinder');
    const videoElement = document.getElementById('video-stream');
    const ghostOverlay = document.getElementById('ghost-overlay');
    const canvas = document.getElementById('capture-canvas');
    const ctx = canvas.getContext('2d');
    const wiggleResult = document.getElementById('wiggle-result');
    
    // Buttons & UI
    const btnCapture = document.getElementById('btn-capture');
    const btnGenerate = document.getElementById('btn-generate');
    const btnReset = document.getElementById('btn-reset');
    const btnBack = document.getElementById('btn-back');
    const btnSaveGif = document.getElementById('btn-save-gif');
    const btnSwitchCamera = document.getElementById('btn-switch-camera');
    const btnAspect = document.getElementById('btn-aspect');
    const gifLoading = document.getElementById('gif-loading');
    const speedSlider = document.getElementById('speed-slider');
    const speedDisplay = document.getElementById('speed-display');
    const photoCounter = document.getElementById('photo-counter');

    // State
    let stream = null;
    let frames = [];
    let wiggleInterval = null;
    let currentFrameIndex = 0;
    let playDirection = 1;
    let currentFacingMode = 'environment';
    
    // Aspect Ratio Options
    const aspectRatios = [
      { name: '3:4', value: 3/4 },
      { name: '9:16', value: 9/16 },
      { name: '1:1', value: 1/1 },
      { name: '16:9', value: 16/9 },
      { name: '4:3', value: 4/3 }
    ];
    let arIndex = 0; // Starts at 3:4

    // --- HARD ROCK SIZING LOGIC ---
    function resizeViewfinder() {
      if (!cameraView.classList.contains('active')) return;

      const rect = viewfinderContainer.getBoundingClientRect();
      const cw = rect.width;
      const ch = rect.height;

      if (cw === 0 || ch === 0) return;

      const targetRatio = aspectRatios[arIndex].value;

      let finalWidth, finalHeight;
      if (cw / ch > targetRatio) {
        finalHeight = ch;
        finalWidth = ch * targetRatio;
      } else {
        finalWidth = cw;
        finalHeight = cw / targetRatio;
      }

      viewfinder.style.width = `${finalWidth}px`;
      viewfinder.style.height = `${finalHeight}px`;
    }

    // --- CAMERA SETUP ---
    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { 
            facingMode: currentFacingMode,
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });
        videoElement.srcObject = stream;
        
        if (currentFacingMode === 'user') {
          videoElement.style.transform = 'scaleX(-1)';
          ghostOverlay.style.transform = 'scaleX(-1)';
        } else {
          videoElement.style.transform = 'none';
          ghostOverlay.style.transform = 'none';
        }
      } catch (err) {
        alert("Camera access denied or unavailable. Please ensure you have granted camera permissions.");
        console.error(err);
      }
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
    }
    
    // --- UI ACTIONS ---
    btnSwitchCamera.addEventListener('click', () => {
      currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
      stopCamera();
      startCamera();
    });

    btnAspect.addEventListener('click', () => {
      arIndex = (arIndex + 1) % aspectRatios.length;
      btnAspect.textContent = aspectRatios[arIndex].name;
      resizeViewfinder();
    });

    // --- CAPTURE MATH (NO STRETCH CROPPING) ---
    btnCapture.addEventListener('click', () => {
      if (!stream) return;

      const vw = videoElement.videoWidth;
      const vh = videoElement.videoHeight;
      const videoRatio = vw / vh;
      const targetRatio = aspectRatios[arIndex].value;

      let sx, sy, sWidth, sHeight;

      if (videoRatio > targetRatio) {
        sHeight = vh;
        sWidth = vh * targetRatio;
        sx = (vw - sWidth) / 2;
        sy = 0;
      } else {
        sWidth = vw;
        sHeight = vw / targetRatio;
        sx = 0;
        sy = (vh - sHeight) / 2;
      }

      canvas.width = Math.round(sWidth);
      canvas.height = Math.round(sHeight);

      ctx.save();
      if (currentFacingMode === 'user') {
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
      }
      
      ctx.drawImage(videoElement, sx, sy, sWidth, sHeight, 0, 0, canvas.width, canvas.height);
      ctx.restore();
      
      const imageData = canvas.toDataURL('image/jpeg', 1.0);
      frames.push(imageData);

      btnAspect.disabled = true;
      btnAspect.classList.add('opacity-50');

      photoCounter.textContent = `${frames.length} / 15`;
      btnGenerate.disabled = frames.length < 2;
      btnReset.disabled = false;

      ghostOverlay.src = imageData;
      ghostOverlay.classList.remove('hidden');

      viewfinder.style.opacity = '0.3';
      setTimeout(() => viewfinder.style.opacity = '1', 100);
      
      if (frames.length >= 15) {
        btnCapture.disabled = true;
        btnCapture.style.opacity = '0.5';
        btnGenerate.classList.add('text-green-400');
        btnGenerate.classList.remove('text-blue-400');
      }
    });

    // --- RESET ---
    btnReset.addEventListener('click', () => {
      frames = [];
      photoCounter.textContent = `0 / 15`;
      ghostOverlay.classList.add('hidden');
      btnGenerate.disabled = true;
      btnReset.disabled = true;
      btnCapture.disabled = false;
      btnCapture.style.opacity = '1';
      btnGenerate.classList.remove('text-green-400');
      btnGenerate.classList.add('text-blue-400');
      
      btnAspect.disabled = false;
      btnAspect.classList.remove('opacity-50');
    });

    // --- GENERATE ---
    btnGenerate.addEventListener('click', () => {
      stopCamera();
      cameraView.classList.remove('active');
      previewView.classList.add('active');
      startWiggle();
    });

    btnBack.addEventListener('click', () => {
      stopWiggle();
      previewView.classList.remove('active');
      cameraView.classList.add('active');
      startCamera();
      setTimeout(resizeViewfinder, 10);
    });

    // --- ANIMATION ---
    function startWiggle() {
      stopWiggle();
      if (frames.length === 0) return;

      let speed = parseInt(speedSlider.value);
      wiggleResult.src = frames[0];

      wiggleInterval = setInterval(() => {
        wiggleResult.src = frames[currentFrameIndex];
        
        if (frames.length > 2) {
          currentFrameIndex += playDirection;
          if (currentFrameIndex >= frames.length - 1 || currentFrameIndex <= 0) {
            playDirection *= -1;
          }
        } else {
          currentFrameIndex = (currentFrameIndex + 1) % frames.length;
        }
      }, speed);
    }

    function stopWiggle() {
      if (wiggleInterval) clearInterval(wiggleInterval);
    }

    speedSlider.addEventListener('input', (e) => {
      speedDisplay.textContent = e.target.value;
      startWiggle();
    });

    // --- HIGH-RES GIF LOGIC ---
    btnSaveGif.addEventListener('click', () => {
      if (frames.length === 0) return;

      btnSaveGif.disabled = true;
      btnSaveGif.classList.add('opacity-50', 'cursor-not-allowed');
      gifLoading.classList.remove('hidden');

      let gifSequence = [];
      if (frames.length > 2) {
        for (let i = 0; i < frames.length; i++) gifSequence.push(frames[i]);
        for (let i = frames.length - 2; i > 0; i--) gifSequence.push(frames[i]);
      } else {
        gifSequence = [...frames]; 
      }

      const currentSpeed = parseInt(speedSlider.value);
      
      const maxGifWidth = 1080;
      let gifW = canvas.width;
      let gifH = canvas.height;
      
      if (gifW > maxGifWidth) {
        const ratio = gifW / gifH;
        gifW = maxGifWidth;
        gifH = Math.round(gifW / ratio);
      }

      gifshot.createGIF({
        images: gifSequence,
        interval: currentSpeed / 1000,
        gifWidth: gifW,
        gifHeight: gifH,
        sampleInterval: 1, 
        numWorkers: 4,     
      }, function(obj) {
        btnSaveGif.disabled = false;
        btnSaveGif.classList.remove('opacity-50', 'cursor-not-allowed');
        gifLoading.classList.add('hidden');

        if (!obj.error) {
          const link = document.createElement('a');
          link.href = obj.image;
          link.download = `wigglegram_${Date.now()}.gif`;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        } else {
          alert("Oops! Something went wrong generating the GIF.");
        }
      });
    });

    // Event Listeners for Load & Screen Rotation/Resizing
    window.addEventListener('load', () => {
      startCamera();
      setTimeout(resizeViewfinder, 100);
    });
    window.addEventListener('resize', resizeViewfinder);

  </script>
</body>
</html>
